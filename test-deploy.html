<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 教学案例 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 800px;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        p {
            color: #666;
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .status {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }
        
        .status-title {
            color: #16a34a;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .status-info {
            color: #15803d;
            font-size: 0.95em;
        }
        
        .deploy-time {
            color: #999;
            font-size: 0.85em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">👨‍💻</div>
        <h1>AI 教学案例</h1>
        <p>
            欢迎使用 AI 教学案例平台！<br>
            这里展示由 Coder Agent 自动部署的交互式教学演示。
        </p>
        
        <div class="status">
            <div class="status-title">✅ 部署成功</div>
            <div class="status-info">
                本页面已通过 GitHub + Vercel 自动部署<br>
                仓库：mhonwei/AIteachingcases
            </div>
            <div class="deploy-time" id="deploy-time"></div>
        </div>
    </div>
    
    <script>
        // 显示部署时间
        const now = new Date();
        document.getElementById('deploy-time').textContent = 
            `部署时间：${now.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}`;
        
        // 控制台信息
        console.log('🚀 Coder Agent 部署成功');
        console.log('📁 仓库：mhonwei/AIteachingcases');
        console.log('🌐 访问：https://a-iteachingcases.vercel.app');
    </script>
</body>
</html>
