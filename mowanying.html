<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莫婉滢大宝贝 - 烟花绽放</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'STKaiti', 'KaiTi', serif;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* 云朵 */
        .cloud {
            position: absolute;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 100%);
            border-radius: 50%;
            filter: blur(2px);
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .cloud-1 {
            width: 150px;
            height: 50px;
            top: 8%;
            left: -200px;
            animation: floatCloud1 50s linear infinite;
        }
        .cloud-1::before { width: 70px; height: 70px; top: -35px; left: 25px; }
        .cloud-1::after { width: 90px; height: 90px; top: -45px; left: 60px; }

        .cloud-2 {
            width: 120px;
            height: 40px;
            top: 20%;
            left: -200px;
            animation: floatCloud2 65s linear infinite;
            animation-delay: -25s;
        }
        .cloud-2::before { width: 55px; height: 55px; top: -28px; left: 18px; }
        .cloud-2::after { width: 75px; height: 75px; top: -38px; left: 45px; }

        .cloud-3 {
            width: 180px;
            height: 55px;
            top: 3%;
            left: -200px;
            animation: floatCloud3 55s linear infinite;
            animation-delay: -15s;
        }
        .cloud-3::before { width: 80px; height: 80px; top: -40px; left: 30px; }
        .cloud-3::after { width: 100px; height: 100px; top: -50px; left: 70px; }

        @keyframes floatCloud1 {
            from { left: -200px; }
            to { left: 100vw; }
        }
        @keyframes floatCloud2 {
            from { left: -200px; }
            to { left: 100vw; }
        }
        @keyframes floatCloud3 {
            from { left: -200px; }
            to { left: 100vw; }
        }

        /* 画布 - 烟花 */
        #fireworkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 浮动文字 */
        .floating-text {
            position: fixed;
            font-size: clamp(36px, 10vw, 80px);
            font-weight: bold;
            color: #fff;
            text-shadow: 
                0 0 10px #ff69b4,
                0 0 20px #ff69b4,
                0 0 30px #ff1493,
                0 0 40px #ff1493,
                0 0 60px #ff1493,
                2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
            opacity: 0;
            animation: appearAndFloat 15s ease-in-out infinite;
            letter-spacing: 12px;
            white-space: nowrap;
            font-family: 'KaiTi', 'STKaiti', serif;
        }

        .text-1 {
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0s;
        }

        .text-2 {
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 5s;
        }

        .text-3 {
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 10s;
        }

        @keyframes appearAndFloat {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(50px) scale(0.5);
            }
            10% {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1.1);
            }
            25% {
                transform: translateX(-50%) translateY(0) scale(1);
            }
            80% {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-50px) scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="sky">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    
    <canvas id="fireworkCanvas"></canvas>
    
    <div class="floating-text text-1">莫婉滢大宝贝</div>
    <div class="floating-text text-2">莫婉滢大宝贝</div>
    <div class="floating-text text-3">莫婉滢大宝贝</div>

    <script>
        // 创建星空背景
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.style.cssText = `
                position: absolute;
                width: ${Math.random() * 2 + 1}px;
                height: ${Math.random() * 2 + 1}px;
                background: white;
                border-radius: 50%;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                animation: twinkle ${Math.random() * 3 + 2}s ease-in-out infinite;
                animation-delay: ${Math.random() * 3}s;
            `;
            starsContainer.appendChild(star);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes twinkle {
                0%, 100% { opacity: 0.3; transform: scale(1); }
                50% { opacity: 1; transform: scale(1.5); }
            }
        `;
        document.head.appendChild(style);

        // 烟花动画
        const canvas = document.getElementById('fireworkCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let fireworks = [];
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        resize();
        window.addEventListener('resize', resize);

        // 真实烟花颜色
        const fireworkColors = [
            { h: 0, s: 100, l: 60 },     // 红色
            { h: 30, s: 100, l: 60 },    // 橙色
            { h: 45, s: 100, l: 60 },    // 金色
            { h: 60, s: 100, l: 60 },    // 黄色
            { h: 120, s: 100, l: 50 },   // 绿色
            { h: 180, s: 100, l: 60 },   // 青色
            { h: 210, s: 100, l: 60 },   // 蓝色
            { h: 270, s: 100, l: 65 },   // 紫色
            { h: 300, s: 100, l: 60 },   // 洋红
            { h: 330, s: 100, l: 60 },   // 粉色
        ];

        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function randomColor() {
            return fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
        }

        // 爆炸特效粒子
        class Particle {
            constructor(x, y, color, isSparkle = false) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.isSparkle = isSparkle;
                
                // 爆炸散开
                this.angle = random(0, Math.PI * 2);
                this.speed = random(2, 12);
                
                // 物理属性
                this.friction = 0.96;
                this.gravity = random(0.05, 0.15);
                this.decay = random(0.008, 0.025);
                this.alpha = 1;
                
                // 闪烁效果
                this.hue = color.h + random(-15, 15);
                this.brightness = random(50, 80);
                
                // 拖尾
                this.trail = [];
                this.trailLength = isSparkle ? 3 : 8;
                
                // 大小
                this.size = isSparkle ? random(1, 2.5) : random(2, 4);
            }

            update() {
                // 记录拖尾
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                // 移动
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                
                // 重力加速
                this.angle += random(-0.02, 0.02);
                
                // 渐隐
                this.alpha -= this.decay;
                
                // 闪烁
                if (Math.random() < 0.3) {
                    this.brightness = random(60, 100);
                }
                
                return this.alpha > 0;
            }

            draw() {
                // 绘制拖尾
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * this.alpha * 0.5;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, ${this.color.s}%, ${this.brightness}%, ${trailAlpha})`;
                    ctx.fill();
                }
                
                // 绘制主体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, ${this.color.s}%, ${this.brightness}%, ${this.alpha})`;
                ctx.fill();
                
                // 中心亮点
                if (this.alpha > 0.5) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.8})`;
                    ctx.fill();
                }
            }
        }

        // 烟花火箭
        class Firework {
            constructor(sx, sy, tx, ty) {
                this.x = sx;
                this.y = sy;
                this.sx = sx;
                this.sy = sy;
                this.tx = tx;
                this.ty = ty;
                this.color = randomColor();
                
                this.distanceToTarget = Math.sqrt(Math.pow(tx - sx, 2) + Math.pow(ty - sy, 2));
                this.distanceTraveled = 0;
                
                this.angle = Math.atan2(ty - sy, tx - sx);
                this.speed = 8;
                this.acceleration = 1.03;
                
                this.trail = [];
                this.trailLength = 15;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                this.speed *= this.acceleration;
                const vx = Math.cos(this.angle) * this.speed;
                const vy = Math.sin(this.angle) * this.speed;
                
                this.distanceTraveled = Math.sqrt(Math.pow(this.sx - this.x, 2) + Math.pow(this.sy - this.y, 2));
                
                if (this.distanceTraveled >= this.distanceToTarget) {
                    // 爆炸！
                    this.explode();
                    return false;
                } else {
                    this.x += vx;
                    this.y += vy;
                    return true;
                }
            }

            explode() {
                // 多层爆炸效果
                const particleCount = 150;
                
                // 主爆炸
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle(this.tx, this.ty, this.color));
                }
                
                // 彩色火花散射
                const sparkColors = fireworkColors.concat([this.color]);
                for (let i = 0; i < 50; i++) {
                    const randomColor2 = sparkColors[Math.floor(Math.random() * sparkColors.length)];
                    particles.push(new Particle(this.tx, this.ty, randomColor2, true));
                }
                
                // 中心闪光
                createFlash(this.tx, this.ty, this.color);
            }

            draw() {
                // 绘制拖尾
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const ratio = i / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2 * ratio, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.color.h}, 100%, 70%, ${ratio * 0.8})`;
                    ctx.fill();
                }
                
                // 火箭头部
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.color.h}, 100%, 80%)`;
                ctx.fill();
                
                // 尾焰
                ctx.beginPath();
                ctx.moveTo(this.x - Math.cos(this.angle) * 8, this.y - Math.sin(this.angle) * 8);
                ctx.lineTo(this.x - Math.cos(this.angle) * 20 - Math.cos(this.angle + Math.PI/4) * 5, 
                          this.y - Math.sin(this.angle) * 20 - Math.sin(this.angle + Math.PI/4) * 5);
                ctx.lineTo(this.x - Math.cos(this.angle) * 20 - Math.cos(this.angle - Math.PI/4) * 5, 
                          this.y - Math.sin(this.angle) * 20 - Math.sin(this.angle - Math.PI/4) * 5);
                ctx.closePath();
                ctx.fillStyle = 'rgba(255, 150, 50, 0.8)';
                ctx.fill();
            }
        }

        // 闪光效果
        let flashes = [];
        
        function createFlash(x, y, color) {
            flashes.push({
                x, y, color,
                radius: 5,
                maxRadius: 80,
                alpha: 1
            });
        }

        function drawFlashes() {
            flashes = flashes.filter(f => {
                f.radius += 4;
                f.alpha -= 0.04;
                
                if (f.alpha <= 0) return false;
                
                // 光晕
                const gradient = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.radius);
                gradient.addColorStop(0, `hsla(${f.color.h}, 100%, 80%, ${f.alpha * 0.5})`);
                gradient.addColorStop(0.5, `hsla(${f.color.h}, 100%, 60%, ${f.alpha * 0.2})`);
                gradient.addColorStop(1, `hsla(${f.color.h}, 100%, 50%, 0)`);
                
                ctx.beginPath();
                ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                return true;
            });
        }

        // 发射烟花
        function launchFirework() {
            const sx = random(width * 0.1, width * 0.9);
            const sy = height;
            const tx = random(width * 0.15, width * 0.85);
            const ty = random(height * 0.1, height * 0.5);
            fireworks.push(new Firework(sx, sy, tx, ty));
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 深色透明背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 闪光效果
            drawFlashes();

            // 更新和绘制烟花火箭
            fireworks = fireworks.filter(f => {
                f.draw();
                return f.update();
            });

            // 更新和绘制粒子
            particles = particles.filter(p => {
                p.draw();
                return p.update();
            });

            // 随机发射烟花
            if (Math.random() < 0.025) {
                launchFirework();
            }
        }

        // 初始发射一批烟花
        setTimeout(() => {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => launchFirework(), i * 400);
            }
        }, 500);

        animate();

        // 持续发射
        setInterval(() => {
            if (Math.random() < 0.5) {
                launchFirework();
            }
        }, 500);
    </script>
</body>
</html>
