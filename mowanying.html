<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莫婉滢大宝贝 - 烟花绽放</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'STKaiti', 'KaiTi', serif;
        }

        /* 蓝天白云背景 */
        .sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                #1e90ff 0%, 
                #00bfff 30%, 
                #87ceeb 60%, 
                #b0e0e6 100%);
            z-index: 0;
        }

        /* 云朵 */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.9;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud-1 {
            width: 120px;
            height: 40px;
            top: 10%;
            left: -200px;
            animation: floatCloud1 45s linear infinite;
        }
        .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .cloud-1::after { width: 80px; height: 80px; top: -40px; left: 50px; }

        .cloud-2 {
            width: 100px;
            height: 35px;
            top: 25%;
            left: -200px;
            animation: floatCloud2 60s linear infinite;
            animation-delay: -20s;
        }
        .cloud-2::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-2::after { width: 70px; height: 70px; top: -35px; left: 40px; }

        .cloud-3 {
            width: 140px;
            height: 45px;
            top: 5%;
            left: -200px;
            animation: floatCloud3 55s linear infinite;
            animation-delay: -10s;
        }
        .cloud-3::before { width: 70px; height: 70px; top: -35px; left: 25px; }
        .cloud-3::after { width: 90px; height: 90px; top: -45px; left: 60px; }

        @keyframes floatCloud1 {
            from { left: -200px; }
            to { left: 100vw; }
        }
        @keyframes floatCloud2 {
            from { left: -200px; }
            to { left: 100vw; }
        }
        @keyframes floatCloud3 {
            from { left: -200px; }
            to { left: 100vw; }
        }

        /* 画布 - 烟花 */
        #fireworkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 浮动文字 */
        .floating-text {
            position: fixed;
            font-size: clamp(32px, 8vw, 72px);
            font-weight: bold;
            color: #fff;
            text-shadow: 
                0 0 10px #ff69b4,
                0 0 20px #ff69b4,
                0 0 30px #ff1493,
                0 0 40px #ff1493,
                2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
            opacity: 0;
            animation: appearAndFloat 12s ease-in-out infinite;
            letter-spacing: 8px;
            white-space: nowrap;
        }

        .text-1 {
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0s;
        }

        .text-2 {
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 4s;
        }

        .text-3 {
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 8s;
        }

        @keyframes appearAndFloat {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(30px) scale(0.8);
            }
            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
            30% {
                transform: translateX(-50%) translateY(0) scale(1);
            }
            85% {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px) scale(1.1);
            }
        }
    </style>
</head>
<body>
    <div class="sky">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    
    <canvas id="fireworkCanvas"></canvas>
    
    <div class="floating-text text-1">莫婉滢大宝贝</div>
    <div class="floating-text text-2">莫婉滢大宝贝</div>
    <div class="floating-text text-3">莫婉滢大宝贝</div>

    <script>
        // 烟花动画
        const canvas = document.getElementById('fireworkCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let fireworks = [];
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        resize();
        window.addEventListener('resize', resize);

        // 烟花颜色 - 使用HSL色相
        const colors = [
            0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330
        ];

        // 随机数
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function randomHue() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // 烟花类
        class Firework {
            constructor(sx, sy, tx, ty) {
                this.x = sx;
                this.y = sy;
                this.sx = sx;
                this.sy = sy;
                this.tx = tx;
                this.ty = ty;
                this.distanceToTarget = Math.sqrt(Math.pow(tx - sx, 2) + Math.pow(ty - sy, 2));
                this.distanceTraveled = 0;
                this.coordinates = [];
                this.coordinateCount = 3;
                while (this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                this.angle = Math.atan2(ty - sy, tx - sx);
                this.speed = 2;
                this.acceleration = 1.05;
                this.brightness = random(50, 70);
                this.hue = randomHue();
            }

            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                this.speed *= this.acceleration;
                const vx = Math.cos(this.angle) * this.speed;
                const vy = Math.sin(this.angle) * this.speed;
                this.distanceTraveled = Math.sqrt(Math.pow(this.sx - this.x, 2) + Math.pow(this.sy - this.y, 2));
                if (this.distanceTraveled >= this.distanceToTarget) {
                    createParticles(this.tx, this.ty, this.hue);
                    fireworks.splice(index, 1);
                } else {
                    this.x += vx;
                    this.y += vy;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], 
                          this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = 'hsl(' + this.hue + ', 100%, ' + this.brightness + '%)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // 粒子类
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.coordinates = [];
                this.coordinateCount = 5;
                while (this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                this.angle = random(0, Math.PI * 2);
                this.speed = random(1, 10);
                this.friction = 0.95;
                this.gravity = 1;
                this.hue = hue + random(-30, 30);
                this.brightness = random(50, 80);
                this.alpha = 1;
                this.decay = random(0.015, 0.03);
            }

            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;
                if (this.alpha <= 0) {
                    particles.splice(index, 1);
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], 
                          this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = 'hsla(' + this.hue + ', 100%, ' + this.brightness + '%, ' + this.alpha + ')';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // 创建粒子
        function createParticles(x, y, hue) {
            const particleCount = 80;
            while (particleCount--) {
                particles.push(new Particle(x, y, hue));
            }
        }

        // 发射烟花
        function launchFirework() {
            const sx = random(width * 0.1, width * 0.9);
            const sy = height;
            const tx = random(width * 0.1, width * 0.9);
            const ty = random(height * 0.1, height * 0.5);
            fireworks.push(new Firework(sx, sy, tx, ty));
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 透明背景，制造拖尾效果
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter';

            // 更新和绘制烟花
            let i = fireworks.length;
            while (i--) {
                fireworks[i].draw();
                fireworks[i].update(i);
            }

            // 更新和绘制粒子
            i = particles.length;
            while (i--) {
                particles[i].draw();
                particles[i].update(i);
            }

            // 随机发射烟花
            if (Math.random() < 0.03) {
                launchFirework();
            }
        }

        // 初始发射一批烟花
        setTimeout(() => {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => launchFirework(), i * 300);
            }
        }, 500);

        animate();

        // 持续发射烟花
        setInterval(() => {
            if (Math.random() < 0.4) {
                launchFirework();
            }
        }, 400);
    </script>
</body>
</html>
