<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI算法可视化教学系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #eee; padding: 15px; }
        h1 { text-align: center; color: #00d4ff; margin-bottom: 5px; font-size: 24px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 15px; font-size: 14px; }
        .container { display: flex; gap: 15px; max-width: 1600px; margin: 0 auto; flex-wrap: wrap; justify-content: center; }
        .panel { background: #1e1e2e; border-radius: 10px; padding: 15px; }
        .panel-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; border-bottom: 2px solid #667eea; padding-bottom: 8px; }
        .left { width: 300px; }
        .mid { flex: 1; min-width: 500px; }
        .right { width: 380px; }
        
        .case-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .case-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; color: white; background: #333; transition: all 0.3s; }
        .case-btn:hover { transform: scale(1.02); }
        .case-btn.active { border: 3px solid #00d4ff; box-shadow: 0 0 15px rgba(0,212,255,0.3); }
        .case-btn.path { background: linear-gradient(135deg, #667eea, #764ba2); }
        .case-btn.search { background: linear-gradient(135deg, #f093fb, #f5576c); }
        
        .algo-btn { width: 100%; padding: 12px; margin-bottom: 8px; border: none; border-radius: 6px; cursor: pointer; text-align: left; font-size: 13px; color: white; transition: all 0.3s; }
        .algo-btn:hover { transform: translateX(5px); }
        .algo-btn.active { border: 3px solid #00d4ff; }
        .btn-bfs { background: #e91e63; }
        .btn-dfs { background: #9c27b0; }
        .btn-astar { background: #ff9800; }
        .btn-dijkstra { background: #4CAF50; }
        
        .edit-tools { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
        .edit-btn { flex: 1; min-width: 60px; padding: 8px; border: none; border-radius: 5px; cursor: pointer; background: #333; color: #aaa; font-size: 12px; }
        .edit-btn.active { background: #667eea; color: white; }
        
        .control-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .btn-run { background: linear-gradient(135deg, #4CAF50, #45a049); }
        .btn-run:hover { background: linear-gradient(135deg, #45a049, #3d8b40); }
        .btn-reset { background: linear-gradient(135deg, #f44336, #d32f2f); }
        .btn-reset:hover { background: linear-gradient(135deg, #d32f2f, #c62828); }
        
        .speed-control { margin-bottom: 12px; }
        .speed-control label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .speed-control input[type="range"] { width: 100%; }
        
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat { background: #2a2a3e; padding: 10px; border-radius: 6px; text-align: center; }
        .stat-label { font-size: 11px; color: #888; }
        .stat-value { font-size: 20px; color: #00d4ff; font-weight: bold; }
        
        .result { margin-top: 12px; padding: 12px; border-radius: 6px; text-align: center; display: none; font-weight: bold; font-size: 14px; }
        .result.show { display: block; }
        .result.success { background: rgba(76,175,80,0.3); color: #4CAF50; border: 1px solid #4CAF50; }
        .result.fail { background: rgba(244,67,54,0.3); color: #f44336; border: 1px solid #f44336; }
        
        #maze { display: grid; grid-template-columns: repeat(20, 28px); grid-template-rows: repeat(15, 28px); gap: 1px; background: #333; border: 3px solid #00d4ff; margin: 0 auto; }
        .cell { width: 28px; height: 28px; background: #222; cursor: pointer; transition: all 0.15s; }
        .cell.wall { background: #555; }
        .cell.start { background: #4CAF50 !important; border-radius: 50%; transform: scale(0.9); }
        .cell.end { background: #f44336 !important; }
        .cell.path { background: #00d4ff; opacity: 0.8; }
        .cell.visited { background: #3a3a5c; }
        .cell.searching { background: #ff9800; }
        
        #searchMaze { display: grid; grid-template-columns: repeat(15, 32px); grid-template-rows: repeat(12, 32px); gap: 1px; background: #333; border: 3px solid #f5576c; margin: 0 auto; }
        .search-cell { width: 32px; height: 32px; background: #222; cursor: pointer; transition: all 0.15s; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .search-cell.wall { background: #555; }
        .search-cell.start { background: #4CAF50 !important; border-radius: 50%; color: white; font-weight: bold; }
        .search-cell.end { background: #f44336 !important; color: white; font-weight: bold; }
        .search-cell.path { background: #00d4ff; }
        .search-cell.visited { background: #9c27b0; }
        .search-cell.searching { background: #e91e63; }
        
        .legend { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; justify-content: center; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-color { width: 14px; height: 14px; border-radius: 3px; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 8px; background: #333; border: none; border-radius: 5px; color: #aaa; cursor: pointer; font-size: 13px; }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        
        .tab-content { display: none; height: 400px; overflow-y: auto; font-size: 12px; line-height: 1.6; padding-right: 5px; }
        .tab-content.active { display: block; }
        .tab-content h3 { color: #00d4ff; margin: 12px 0 8px; font-size: 14px; border-left: 3px solid #667eea; padding-left: 8px; }
        .tab-content p { margin-bottom: 8px; color: #ccchighlight { background:; }
        . #333; padding: 2px 8px; border-radius: 3px; color: #ff9800; }
        
        .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .pros, .cons { padding: 8px; border-radius: 5px; font-size: 11px; }
        .pros { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.5); }
        .cons { background: rgba(244,67,54,0.15); border: 1px solid rgba(244,67,54,0.5); }
        
        pre { background: #0d0d0d; padding: 10px; border-radius: 5px; font-size: 10px; line-height: 1.4; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; color: #aaa; }
        .code-keyword { color: #569cd6; }
        .code-comment { color: #6a9955; }
        .code-string { color: #ce9178; }
        
        .case-panel { display: none; }
        .case-panel.active { display: block; }
        
        @media (max-width: 1200px) {
            .mid { min-width: 100%; }
            .right { width: 100%; }
        }
    </style>
</head>
<body>
    <h1>AI算法可视化教学系统</h1>
    <p class="subtitle">搜索算法 + 路径规划 | 可视化演示 + 原理讲解 + 代码分析</p>
    
    <div class="container">
        <div class="panel left">
            <div class="panel-title">案例选择</div>
            <div class="case-selector">
                <button class="case-btn search active" onclick="selectCase('search')">搜索算法</button>
                <button class="case-btn path" onclick="selectCase('path')">路径规划</button>
            </div>
            
            <div id="searchPanel" class="case-panel active">
                <div class="panel-title">算法选择</div>
                <button class="algo-btn btn-bfs active" onclick="selectAlgo('bfs')"><strong>BFS</strong> 广度优先搜索</button>
                <button class="algo-btn btn-dfs" onclick="selectAlgo('dfs')"><strong>DFS</strong> 深度优先搜索</button>
                <button class="algo-btn btn-astar" onclick="selectAlgo('astar')"><strong>A*</strong> 启发式搜索</button>
                
                <div class="panel-title" style="margin-top:15px;">编辑地图</div>
                <div class="edit-tools">
                    <button class="edit-btn active" onclick="setEdit('wall')">画墙</button>
                    <button class="edit-btn" onclick="setEdit('start')">起点</button>
                    <button class="edit-btn" onclick="setEdit('end')">终点</button>
                    <button class="edit-btn" onclick="setEdit('erase')">擦除</button>
                </div>
            </div>
            
            <div id="pathPanel" class="case-panel">
                <div class="panel-title">算法选择</div>
                <button class="algo-btn btn-dijkstra active" onclick="selectAlgo('dijkstra')"><strong>Dijkstra</strong> 最短路径</button>
                <button class="algo-btn btn-astar" onclick="selectAlgo('astar2')"><strong>A*</strong> 启发式搜索</button>
                
                <div class="panel-title" style="margin-top:15px;">编辑地图</div>
                <div class="edit-tools">
                    <button class="edit-btn active" onclick="setEdit('wall')">画墙</button>
                    <button class="edit-btn" onclick="setEdit('start')">起点</button>
                    <button class="edit-btn" onclick="setEdit('end')">终点</button>
                    <button class="edit-btn" onclick="setEdit('erase')">擦除</button>
                </div>
            </div>
            
            <div class="control-btns">
                <button class="btn btn-run" onclick="runAI()">运行算法</button>
                <button class="btn btn-reset" onclick="resetMaze()">重置</button>
            </div>
            
            <div class="speed-control">
                <label>运行速度: <span id="speedVal">中</span></label>
                <input type="range" id="speedSlider" min="1" max="100" value="50" oninput="updateSpeed()">
            </div>
            
            <div class="stats">
                <div class="stat"><div class="stat-label">访问节点</div><div class="stat-value" id="visitedCount">0</div></div>
                <div class="stat"><div class="stat-label">路径长度</div><div class="stat-value" id="pathLength">0</div></div>
                <div class="stat"><div class="stat-label">运行时间</div><div class="stat-value" id="runTime">0ms</div></div>
            </div>
            
            <div class="result" id="result"></div>
        </div>
        
        <div class="panel mid">
            <div class="panel-title" style="text-align:center" id="vizTitle">搜索算法可视化</div>
            <div id="searchMaze" class="case-panel active"></div>
            <div id="maze" class="case-panel"></div>
            
            <div class="legend">
                <div class="legend-item"><div class="legend-color" style="background:#4CAF50;border-radius:50%"></div>起点</div>
                <div class="legend-item"><div class="legend-color" style="background:#f44336"></div>终点</div>
                <div class="legend-item"><div class="legend-color" style="background:#555"></div>障碍物</div>
                <div class="legend-item"><div class="legend-color" style="background:#e91e63"></div>搜索中</div>
                <div class="legend-item"><div class="legend-color" style="background:#9c27b0"></div>已访问</div>
                <div class="legend-item"><div class="legend-color" style="background:#00d4ff"></div>最终路径</div>
            </div>
        </div>
        
        <div class="panel right">
            <div class="tabs">
                <button class="tab active" onclick="showTab('原理')">原理</button>
                <button class="tab" onclick="showTab('代码')">代码</button>
            </div>
            <div id="原理" class="tab-content active"></div>
            <div id="代码" class="tab-content"><pre id="codeDisplay"></pre></div>
        </div>
    </div>

    <script>
        const SEARCH_ROWS = 12, SEARCH_COLS = 15;
        const PATH_ROWS = 15, PATH_COLS = 20;
        
        let currentCase = 'search';
        let currentSearchAlgo = 'bfs';
        let currentPathAlgo = 'dijkstra';
        let editMode = 'wall';
        let isRunning = false;
        
        let searchMaze = [];
        let searchStart = {r: 2, c: 2};
        let searchEnd = {r: 9, c: 12};
        
        let pathMaze = [];
        let pathStart = {r: 2, c: 2};
        let pathEnd = {r: 12, c: 17};
        
        const algoInfo = {
            bfs: {
                name: 'BFS 广度优先搜索',
                principle: '<h3>BFS - 广度优先搜索</h3><p>按"层层扩散"的方式搜索。</p><h3>核心思想</h3><p>从起点开始，<span class="highlight">先访问所有邻居节点</span>，再访问邻居的邻居，像水面波纹一样扩散。</p><h3>特点</h3><ul><li>队列实现 (FIFO)</li><li>找到的一定是最短路径</li><li>空间复杂度高</li></ul><h3>应用</h3><p>最短路径、层次遍历、迷宫求解</p><div class="pros-cons"><div class="pros"><h4>优点</h4><ul><li>保证最短路径</li><li>实现简单</li></ul></div><div class="cons"><h4>缺点</h4><ul><li>内存消耗大</li><li>搜索盲目</li></ul></div></div>',
                code:'from collections import deque\n\ndef bfs(grid, start, end):\n    queue = deque([start])\n    visited = {start}\n    parent = {}\n    \n    while queue:\n        r, c = queue.popleft()\n        \n        if (r, c) == end:\n            return reconstruct(parent, end)\n        \n        for dr, dc in dirs:\n            nr, nc = r+dr, c+dc\n            if valid(nr, nc) and (nr,nc) not in visited:\n                visited.add((nr, nc))\n                parent[(nr, nc)] = (r, c)\n                queue.append((nr, nc))\n    \n    return None'
            },
            dfs: {
                name: 'DFS 深度优先搜索',
                principle: '<h3>DFS - 深度优先搜索</h3><p>沿着一条路走到黑，不行再回溯。</p><h3>核心思想</h3><p>从起点开始，<span class="highlight">一直往下走</span>，遇到障碍或边界就回溯。</p><h3>特点</h3><ul><li>栈实现 (或递归)</li><li>不保证最短路径</li><li>空间复杂度低</li></ul><h3>应用</h3><p>拓扑排序、连通分量、排列组合</p><div class="pros-cons"><div class="pros"><h4>优点</h4><ul><li>空间效率高</li><li>实现简单</li></ul></div><div class="cons"><h4>缺点</h4><ul><li>不保证最短</li><li>可能陷入死循环</li></ul></div></div>',
                code:'def dfs(grid, start, end):\n    stack = [start]\n    visited = {start}\n    parent = {}\n    \n    while stack:\n        r, c = stack.pop()\n        \n        if (r, c) == end:\n            return reconstruct(parent, end)\n        \n        for dr, dc in dirs:\n            nr, nc = r+dr, c+dc\n            if valid(nr, nc) and (nr,nc) not in visited:\n                visited.add((nr, nc))\n                parent[(nr, nc)] = (r, c)\n                stack.append((nr, nc))\n    \n    return None'
            },
            astar: {
                name: 'A* 搜索算法',
                principle: '<h3>A* - 启发式搜索</h3><p>BFS的智能版本，加入了"方向感"。</p><h3>核心公式</h3><p>f(n) = g(n) + h(n)</p><ul><li><span class="highlight">g(n)</span>: 已走距离</li><li><span class="highlight">h(n)</span>: 估算剩余距离</li><li><span class="highlight">f(n)</span>: 总估价</li></ul><h3>特点</h3><ul><li>优先队列</li><li>智能引导</li><li>保证最短</li></ul><h3>应用</h3><p>游戏寻路、机器人导航、GPS</p><div class="pros-cons"><div class="pros"><h4>优点</h4><ul><li>效率高</li><li>最优解</li></ul></div><div class="cons"><h4>缺点</h4><ul><li>实现复杂</li><li>启发函数设计</li></ul></div></div>',
                code:'import heapq\n\ndef heuristic(a, b):\n    return abs(a[0]-b[0]) + abs(a[1]-b[1])\n\ndef astar(grid, start, end):\n    pq = [(0, start)]\n    g_score = {start: 0}\n    parent = {}\n    \n    while pq:\n        f, (r,c) = heapq.heappop(pq)\n        \n        if (r,c) == end:\n            return reconstruct(parent, end)\n        \n        for dr,dc in dirs:\n            nr,nc = r+dr, c+dc\n            if valid(nr,nc):\n                g = g_score[(r,c)] + 1\n                if g < g_score.get((nr,nc), float(\'inf\')):\n                    g_score[(nr,nc)] = g\n                    f = g + heuristic((nr,nc), end)\n                    parent[(nr,nc)] = (r,c)\n                    heapq.heappush(pq, (f, (nr,nc)))'
            },
            dijkstra: {
                name: 'Dijkstra 算法',
                principle: '<h3>Dijkstra - 最短路径算法</h3><p>1956年提出，最经典的单源最短路径算法。</p><h3>核心思想</h3><p>从起点开始，<span class="highlight">始终优先处理距离最短的节点</span>，逐步扩展直到找到终点。</p><h3>算法步骤</h3><ol style="margin-left:20px;"><li>起点距离设为0，其他无穷大</li><li>取距离最小的未访问节点</li><li>更新邻居节点距离</li><li>重复直到到达终点</li></ol><h3>应用</h3><p>GPS导航、网络路由、游戏AI</p><div class="pros-cons"><div class="pros"><h4>优点</h4><ul><li>保证最优解</li><li>理论成熟</li></ul></div><div class="cons"><h4>缺点</h4><ul><li>遍历节点多</li><li>无方向性</li></ul></div></div>',
                code:'import heapq\n\ndef dijkstra(grid, start, end):\n    pq = [(0, start)]\n    dist = {start: 0}\n    parent = {}\n    \n    while pq:\n        d, (r, c) = heapq.heappop(pq)\n        \n        if (r, c) == end:\n            return reconstruct(parent, end)\n        \n        for dr, dc in dirs:\n            nr, nc = r+dr, c+dc\n            if valid(nr, nc):\n                new_d = d + 1\n                if new_d < dist.get((nr,nc), float(\'inf\')):\n                    dist[(nr,nc)] = new_d\n                    parent[(nr,nc)] = (r,c)\n                    heapq.heappush(pq, (new_d, (nr,nc)))\n    \n    return None'
            },
            astar2: {
                name: 'A* 路径规划',
                principle: '<h3>A* - 启发式搜索算法</h3><p>Dijkstra的智能改进版，加入启发函数引导方向。</p><h3>核心公式</h3><p>f(n) = g(n) + h(n)</p><ul><li><span class="highlight">g(n)</span>: 起点到当前距离</li><li><span class="highlight">h(n)</span>: 当前到终点估算</li><li><span class="highlight">f(n)</span>: 总估价成本</li></ul><h3>与Dijkstra区别</h3><p>Dijkstra只顾已走距离，A*同时考虑<span class="highlight">还要走多远</span>，像GPS一样智能。</p><div class="pros-cons"><div class="pros"><h4>优点</h4><ul><li>效率高</li><li>保证最优</li></ul></div><div class="cons"><h4>缺点</h4><ul><li>需设计启发函数</li><li>内存消耗大</li></ul></div></div>',
                code:'import heapq\n\ndef heuristic(a, b):\n    return abs(a[0]-b[0]) + abs(a[1]-b[1])\n\ndef astar(grid, start, end):\n    pq = [(0, start)]\n    g_score = {start: 0}\n    parent = {}\n    \n    while pq:\n        f, (r,c) = heapq.heappop(pq)\n        \n        if (r,c) == end:\n            return reconstruct(parent, end)\n        \n        for dr,dc in dirs:\n            nr,nc = r+dr, c+dc\n            if valid(nr,nc):\n                g = g_score[(r,c)] + 1\n                if g < g_score.get((nr,nc), float(\'inf\')):\n                    g_score[(nr,nc)] = g\n                    f = g + heuristic((nr,nc), end)\n                    parent[(nr,nc)] = (r,c)\n                    heapq.heappush(pq, (f, (nr,nc)))'
            }
        };
        
        function initSearch() {
            searchMaze = [];
            for (let r = 0; r < SEARCH_ROWS; r++) {
                searchMaze[r] = [];
                for (let c = 0; c < SEARCH_COLS; c++) searchMaze[r][c] = 0;
            }
            renderSearch();
        }
        
        function initPath() {
            pathMaze = [];
            for (let r = 0; r < PATH_ROWS; r++) {
                pathMaze[r] = [];
                for (let c = 0; c < PATH_COLS; c++) pathMaze[r][c] = 0;
            }
            renderPath();
        }
        
        function renderSearch() {
            const el = document.getElementById('searchMaze');
            el.innerHTML = '';
            for (let r = 0; r < SEARCH_ROWS; r++) {
                for (let c = 0; c < SEARCH_COLS; c++) {
                    const div = document.createElement('div');
                    div.className = 'search-cell';
                    div.dataset.r = r;
                    div.dataset.c = c;
                    if (r === searchStart.r && c === searchStart.c) { div.classList.add('start'); div.textContent = 'S'; }
                    else if (r === searchEnd.r && c === searchEnd.c) { div.classList.add('end'); div.textContent = 'E'; }
                    else if (searchMaze[r][c] === 1) div.classList.add('wall');
                    div.onclick = () => handleSearchClick(r, c);
                    el.appendChild(div);
                }
            }
        }
        
        function renderPath() {
            const el = document.getElementById('maze');
            el.innerHTML = '';
            for (let r = 0; r < PATH_ROWS; r++) {
                for (let c = 0; c < PATH_COLS; c++) {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    div.dataset.r = r;
                    div.dataset.c = c;
                    if (r === pathStart.r && c === pathStart.c) div.classList.add('start');
                    else if (r === pathEnd.r && c === pathEnd.c) div.classList.add('end');
                    else if (pathMaze[r][c] === 1) div.classList.add('wall');
                    div.onclick = () => handlePathClick(r, c);
                    el.appendChild(div);
                }
            }
        }
        
        function handleSearchClick(r, c) {
            if (isRunning) return;
            if (editMode === 'wall') { if (!isSearchSE(r, c)) searchMaze[r][c] = searchMaze[r][c] ? 0 : 1; }
            else if (editMode === 'start') { if (searchMaze[r][c] !== 1) searchStart = {r, c}; }
            else if (editMode === 'end') { if (searchMaze[r][c] !== 1) searchEnd = {r, c}; }
            else if (editMode === 'erase') searchMaze[r][c] = 0;
            renderSearch();
        }
        
        function handlePathClick(r, c) {
            if (isRunning) return;
            if (editMode === 'wall') { if (!isPathSE(r, c)) pathMaze[r][c] = pathMaze[r][c] ? 0 : 1; }
            else if (editMode === 'start') { if (pathMaze[r][c] !== 1) pathStart = {r, c}; }
            else if (editMode === 'end') { if (pathMaze[r][c] !== 1) pathEnd = {r, c}; }
            else if (editMode === 'erase') pathMaze[r][c] = 0;
            renderPath();
        }
        
        function isSearchSE(r, c) { return (r === searchStart.r && c === searchStart.c) || (r === searchEnd.r && c === searchEnd.c); }
        function isPathSE(r, c) { return (r === pathStart.r && c === pathStart.c) || (r === pathEnd.r && c === pathEnd.c); }
        
        function selectCase(caseName) {
            currentCase = caseName;
            document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.case-btn.' + caseName).classList.add('active');
            
            document.querySelectorAll('.case-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(caseName + 'Panel').classList.add('active');
            document.getElementById(caseName + 'Maze').classList.add('active');
            
            document.getElementById('vizTitle').textContent = caseName === 'search' ? '搜索算法可视化' : '路径规划可视化';
            
            updateInfo();
        }
        
        function selectAlgo(algo) {
            if (currentCase === 'search') {
                currentSearchAlgo = algo;
                document.querySelectorAll('#searchPanel .algo-btn').forEach(b => b.classList.remove('active'));
            } else {
                currentPathAlgo = algo;
                document.querySelectorAll('#pathPanel .algo-btn').forEach(b => b.classList.remove('active'));
            }
            event.target.classList.add('active');
            updateInfo();
        }
        
        function setEdit(mode) {
            editMode = mode;
            document.querySelectorAll('.edit-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function updateInfo() {
            const algo = currentCase === 'search' ? currentSearchAlgo : currentPathAlgo;
            document.getElementById('原理').innerHTML = algoInfo[algo].principle;
            document.getElementById('codeDisplay').textContent = algoInfo[algo].code;
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }
        
        function updateSpeed() {
            let v = document.getElementById('speedSlider').value;
            document.getElementById('speedVal').textContent = ['很慢','慢','中','快','很快'][Math.floor((v-1)/20)];
        }
        
        function getSpeed() { return Math.max(5, 150 - document.getElementById('speedSlider').value * 1.5); }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        
        function resetMaze() {
            if (isRunning) return;
            if (currentCase === 'search') {
                initSearch();
                searchStart = {r: 2, c: 2};
                searchEnd = {r: 9, c: 12};
            } else {
                initPath();
                pathStart = {r: 2, c: 2};
                pathEnd = {r: 12, c: 17};
            }
            document.getElementById('visitedCount').textContent = '0';
            document.getElementById('pathLength').textContent = '0';
            document.getElementById('runTime').textContent = '0ms';
            document.getElementById('result').className = 'result';
        }
        
        function clearVis(type) {
            const cells = document.querySelectorAll('.' + type);
            cells.forEach(c => {
                c.classList.remove('searching', 'visited', 'path');
                const r = parseInt(c.dataset.r), cc = parseInt(c.dataset.c);
                if (type === 'search-cell') {
                    if (r === searchStart.r && cc === searchStart.c) { c.classList.add('start'); c.textContent = 'S'; }
                    else if (r === searchEnd.r && cc === searchEnd.c) { c.classList.add('end'); c.textContent = 'E'; }
                    else if (searchMaze[r][cc] === 1) c.classList.add('wall');
                } else {
                    if (r === pathStart.r && cc === pathStart.c) c.classList.add('start');
                    else if (r === pathEnd.r && cc === pathEnd.c) c.classList.add('end');
                    else if (pathMaze[r][cc] === 1) c.classList.add('wall');
                }
            });
        }
        
        async function runAI() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('result').className = 'result';
            
            const startTime = Date.now();
            let visitedCount = 0, path = [];
            
            if (currentCase === 'search') {
                clearVis('search-cell');
                const algo = currentSearchAlgo;
                if (algo === 'bfs') path = await bfs(visitedCount);
                else if (algo === 'dfs') path = await dfs(visitedCount);
                else path = await astarSearch(visitedCount);
            } else {
                clearVis('cell');
                const algo = currentPathAlgo;
                if (algo === 'dijkstra') path = await dijkstra(visitedCount);
                else path = await astarPath(visitedCount);
            }
            
            const runTime = Date.now() - startTime;
            document.getElementById('visitedCount').textContent = visitedCount;
            document.getElementById('runTime').textContent = runTime + 'ms';
            
            if (path && path.length > 0) {
                const cells
            if (path && path.length > 0) {
                const cells = document.querySelectorAll(currentCase === 'search' ? '.search-cell' : '.cell');
                for (let i = 0; i < path.length; i++) {
                    const [r, c] = path[i];
                    const idx = r * (currentCase === 'search' ? SEARCH_COLS : PATH_COLS) + c;
                    cells[idx].classList.remove('searching', 'visited');
                    cells[idx].classList.add('path');
                    await sleep(30);
                }
                document.getElementById('pathLength').textContent = path.length - 1;
                document.getElementById('result').className = 'result show success';
                document.getElementById('result').textContent = '找到路径！长度: ' + (path.length - 1);
            } else {
                document.getElementById('result').className = 'result show fail';
                document.getElementById('result').textContent = '无法到达！';
            }
            isRunning = false;
        }
        
        function dirs() { return [[0,1],[1,0],[0,-1],[-1,0]]; }
        function heuristic(r, c, endR, endC) { return Math.abs(r - endR) + Math.abs(c - endC); }
        
        async function bfs(visitedCount) {
            let queue = [[searchStart.r, searchStart.c, []]];
            let visited = new Set();
            let parent = {};
            const cells = document.querySelectorAll('.search-cell');
            
            while (queue.length > 0) {
                let [r, c, path] = queue.shift();
                let key = r + ',' + c;
                
                if (visited.has(key)) continue;
                visited.add(key);
                visitedCount++; document.getElementById('visitedCount').textContent = visitedCount;
                
                if (r === searchEnd.r && c === searchEnd.c) {
                    return reconstructPath(parent, r, c);
                }
                
                let idx = r * SEARCH_COLS + c;
                if (!isSearchSE(r,c)) cells[idx].classList.add('searching');
                await sleep(getSpeed());
                if (!isSearchSE(r,c)) { cells[idx].classList.remove('searching'); cells[idx].classList.add('visited'); }
                
                for (let [dr, dc] of dirs()) {
                    let nr = r+dr, nc = c+dc, nkey = nr+','+nc;
                    if (nr>=0&&nr<SEARCH_ROWS&&nc>=0&&nc<SEARCH_COLS && searchMaze[nr][nc]!==1 && !visited.has(nkey)) {
                        parent[nkey] = [r,c];
                        queue.push([nr, nc, path.concat([[r,c]])]);
                    }
                }
            }
            return [];
        }
        
        async function dfs(visitedCount) {
            let stack = [[searchStart.r, searchStart.c, []]];
            let visited = new Set();
            let parent = {};
            const cells = document.querySelectorAll('.search-cell');
            
            while (stack.length > 0) {
                let [r, c, path] = stack.pop();
                let key = r + ',' + c;
                
                if (visited.has(key)) continue;
                visited.add(key);
                visitedCount++; document.getElementById('visitedCount').textContent = visitedCount;
                
                if (r === searchEnd.r && c === searchEnd.c) {
                    return reconstructPath(parent, r, c);
                }
                
                let idx = r * SEARCH_COLS + c;
                if (!isSearchSE(r,c)) cells[idx].classList.add('searching');
                await sleep(getSpeed());
                if (!isSearchSE(r,c)) { cells[idx].classList.remove('searching'); cells[idx].classList.add('visited'); }
                
                // 逆序探索，制造更像DFS的效果
                for (let i = dirs().length - 1; i >= 0; i--) {
                    let [dr, dc] = dirs()[i];
                    let nr = r+dr, nc = c+dc, nkey = nr+','+nc;
                    if (nr>=0&&nr<SEARCH_ROWS&&nc>=0&&nc<SEARCH_COLS && searchMaze[nr][nc]!==1 && !visited.has(nkey)) {
                        parent[nkey] = [r,c];
                        stack.push([nr, nc, path.concat([[r,c]])]);
                    }
                }
            }
            return [];
        }
        
        async function astarSearch(visitedCount) {
            let pq = [[heuristic(searchStart.r, searchStart.c, searchEnd.r, searchEnd.c), 0, searchStart.r, searchStart.c, []]];
            let closed = new Set();
            let gScore = {};
            let parent = {};
            const cells = document.querySelectorAll('.search-cell');
            
            while (pq.length > 0) {
                pq.sort((a,b) => a[0]-b[0]);
                let [f, g, r, c, path] = pq.shift();
                let key = r + ',' + c;
                
                if (closed.has(key)) continue;
                closed.add(key);
                visitedCount++; document.getElementById('visitedCount').textContent = visitedCount;
                
                if (r === searchEnd.r && c === searchEnd.c) {
                    return reconstructPath(parent, r, c);
                }
                
                let idx = r * SEARCH_COLS + c;
                if (!isSearchSE(r,c)) cells[idx].classList.add('searching');
                await sleep(getSpeed());
                if (!isSearchSE(r,c)) { cells[idx].classList.remove('searching'); cells[idx].classList.add('visited'); }
                
                for (let [dr, dc] of dirs()) {
                    let nr=r+dr, nc=c+dc, nkey=nr+','+nc;
                    if (nr>=0&&nr<SEARCH_ROWS&&nc>=0&&nc<SEARCH_COLS && searchMaze[nr][nc]!==1 && !closed.has(nkey)) {
                        let ng = g + 1;
                        if (ng < (gScore[nkey]||Infinity)) {
                            gScore[nkey] = ng;
                            let nf = ng + heuristic(nr, nc, searchEnd.r, searchEnd.c);
                            parent[nkey] = [r,c];
                            pq.push([nf, ng, nr, nc, path.concat([[r,c]])]);
                        }
                    }
                }
            }
            return [];
        }
        
        async function dijkstra(visitedCount) {
            let pq = [[0, pathStart.r, pathStart.c, []]];
            let visited = new Set();
            let dist = {}, parent = {};
            const cells = document.querySelectorAll('.cell');
            
            while (pq.length > 0) {
                pq.sort((a,b) => a[0]-b[0]);
                let [d, r, c, path] = pq.shift();
                let key = r + ',' + c;
                
                if (visited.has(key)) continue;
                visited.add(key);
                visitedCount++; document.getElementById('visitedCount').textContent = visitedCount;
                
                if (r === pathEnd.r && c === pathEnd.c) {
                    return reconstructPath(parent, r, c);
                }
                
                let idx = r * PATH_COLS + c;
                if (!isPathSE(r,c)) cells[idx].classList.add('searching');
                await sleep(getSpeed());
                if (!isPathSE(r,c)) { cells[idx].classList.remove('searching'); cells[idx].classList.add('visited'); }
                
                for (let [dr, dc] of dirs()) {
                    let nr=r+dr, nc=c+dc, nkey=nr+','+nc;
                    if (nr>=0&&nr<PATH_ROWS&&nc>=0&&nc<PATH_COLS && pathMaze[nr][nc]!==1 && !visited.has(nkey)) {
                        let nd = d+1;
                        if (nd < (dist[nkey]||Infinity)) {
                            dist[nkey] = nd;
                            parent[nkey] = [r,c];
                            pq.push([nd, nr, nc, path.concat([[r,c]])]);
                        }
                    }
                }
            }
            return [];
        }
        
        async function astarPath(visitedCount) {
            let pq = [[heuristic(pathStart.r, pathStart.c, pathEnd.r, pathEnd.c), 0, pathStart.r, pathStart.c, []]];
            let closed = new Set();
            let gScore = {};
            let parent = {};
            const cells = document.querySelectorAll('.cell');
            
            while (pq.length > 0) {
                pq.sort((a,b) => a[0]-b[0]);
                let [f, g, r, c, path] = pq.shift();
                let key = r + ',' + c;
                
                if (closed.has(key)) continue;
                closed.add(key);
                visitedCount++; document.getElementById('visitedCount').textContent = visitedCount;
                
                if (r === pathEnd.r && c === pathEnd.c) {
                    return reconstructPath(parent, r, c);
                }
                
                let idx = r * PATH_COLS + c;
                if (!isPathSE(r,c)) cells[idx].classList.add('searching');
                await sleep(getSpeed());
                if (!isPathSE(r,c)) { cells[idx].classList.remove('searching'); cells[idx].classList.add('visited'); }
                
                for (let [dr, dc] of dirs()) {
                    let nr=r+dr, nc=c+dc, nkey=nr+','+nc;
                    if (nr>=0&&nr<PATH_ROWS&&nc>=0&&nc<PATH_COLS && pathMaze[nr][nc]!==1 && !closed.has(nkey)) {
                        let ng = g + 1;
                        if (ng < (gScore[nkey]||Infinity)) {
                            gScore[nkey] = ng;
                            let nf = ng + heuristic(nr, nc, pathEnd.r, pathEnd.c);
                            parent[nkey] = [r,c];
                            pq.push([nf, ng, nr, nc, path.concat([[r,c]])]);
                        }
                    }
                }
            }
            return [];
        }
        
        function reconstructPath(parent, endR, endC) {
            let path = [], key = endR + ',' + endC;
            while (key) {
                let [r, c] = key.split(',').map(Number);
                path.unshift([r, c]);
                key = parent[key] ? parent[key][0]+','+parent[key][1] : null;
            }
            return path;
        }
        
        // 初始化
        initSearch();
        initPath();
        updateInfo();
    </script>
