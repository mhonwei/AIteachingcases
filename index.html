<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI算法可视化教学系统</title>
<style>
body{font-family:Microsoft YaHei;background:#1a1a2e;color:#eee;padding:20px;margin:0}
h1{text-align:center;color:#00d4ff}
.container{display:flex;gap:20px;max-width:1400px;margin:0 auto;flex-wrap:wrap}
.panel{background:#1e1e2e;border-radius:10px;padding:15px}
.left{width:260px}
.mid{flex:1;min-width:450px}
.right{width:320px}
.btn-case{width:100%;padding:15px;margin:5px 0;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold;color:#fff;background:#333}
.btn-case.active{border:3px solid #00d4ff}
.btn-algo{width:100%;padding:10px;margin:3px 0;border:none;border-radius:5px;cursor:pointer;text-align:left;color:#fff;background:#444}
.btn-algo.active{border:2px solid #00d4ff}
.tools{display:flex;gap:5px;margin:10px 0}
.tool-btn{flex:1;padding:8px;border:none;border-radius:5px;cursor:pointer;background:#333;color:#aaa}
.tool-btn.active{background:#667eea;color:#fff}
.ctrl{display:flex;gap:10px;margin:10px 0}
.run-btn{flex:1;padding:12px;border:none;border-radius:6px;cursor:pointer;background:#4CAF50;color:#fff;font-weight:bold}
.rst-btn{flex:1;padding:12px;border:none;border-radius:6px;cursor:pointer;background:#f44336;color:#fff;font-weight:bold}
.speed{margin:10px 0}
.speed label{color:#aaa;font-size:12px}
.stats{display:flex;gap:10px;margin:10px 0}
.stat{flex:1;background:#2a2a3e;padding:10px;border-radius:5px;text-align:center}
.stat-num{font-size:18px;color:#00d4ff;font-weight:bold}
.stat-lbl{font-size:10px;color:#888}
#grid{display:grid;gap:1px;background:#333;margin:0 auto}
.cell{background:#222;cursor:pointer}
.cell.wall{background:#555}
.cell.start{background:#4CAF50;border-radius:50%}
.cell.end{background:#f44336}
.cell.visited{background:#9c27b0}
.cell.searching{background:#e91e63}
.cell.path{background:#00d4ff}
.legend{display:flex;gap:15px;margin-top:10px;justify-content:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px}
.box{width:12px;height:12px;border-radius:2px}
.tabs{display:flex;gap:5px;margin-bottom:10px}
.tab{flex:1;padding:8px;background:#333;border:none;border-radius:5px;color:#aaa;cursor:pointer}
.tab.active{background:#667eea;color:#fff}
.content{height:350px;overflow-y:auto;font-size:12px}
.content h3{color:#00d4ff;margin:10px 0 5px}
pre{background:#111;padding:10px;border-radius:5px;font-size:11px;overflow-x:auto;margin:5px 0}
.result{padding:10px;border-radius:5px;text-align:center;margin:10px 0;display:none}
.result.show{display:block}
.result.ok{background:rgba(76,175,80,0.3);color:#4CAF50}
.result.no{background:rgba(244,67,54,0.3);color:#f44336}
</style>
</head>
<body>
<h1>AI算法可视化教学系统</h1>
<div class="container">
<div class="panel left">
<button class="btn-case active" onclick="selCase('search')">搜索算法</button>
<button class="btn-case" onclick="selCase('path')">路径规划</button>

<div id="searchOpts">
<button class="btn-algo active" onclick="selAlgo('bfs')">BFS 广度优先</button>
<button class="btn-algo" onclick="selAlgo('dfs')">DFS 深度优先</button>
<button class="btn-algo" onclick="selAlgo('astar')">A* 启发式</button>
</div>

<div id="pathOpts" style="display:none">
<button class="btn-algo active" onclick="selAlgo('dijkstra')">Dijkstra 最短路径</button>
<button class="btn-algo" onclick="selAlgo('astar2')">A* 启发式</button>
</div>

<div class="tools">
<button class="tool-btn active" onclick="setTool('wall')">画墙</button>
<button class="tool-btn" onclick="setTool('start')">起点</button>
<button class="tool-btn" onclick="setTool('end')">终点</button>
<button class="tool-btn" onclick="setTool('erase')">擦除</button>
</div>

<div class="ctrl">
<button class="run-btn" onclick="run()">运行</button>
<button class="rst-btn" onclick="rst()">重置</button>
</div>

<div class="speed"><label>速度: <span id="spdVal">中</span></label>
<input type="range" id="spd" min="1" max="100" value="50" oninput="upSpd()"></div>

<div class="stats">
<div class="stat"><div class="stat-num" id="visCnt">0</div><div class="stat-lbl">访问节点</div></div>
<div class="stat"><div class="stat-num" id="pathLen">0</div><div class="stat-lbl">路径长度</div></div>
</div>

<div class="result" id="rslt"></div>
</div>

<div class="panel mid">
<div id="grid"></div>
<div class="legend">
<div class="legend-item"><div class="box" style="background:#4CAF50;border-radius:50%"></div>起点</div>
<div class="legend-item"><div class="box" style="background:#f44336"></div>终点</div>
<div class="legend-item"><div class="box" style="background:#555"></div>墙</div>
<div class="legend-item"><div class="box" style="background:#e91e63"></div>搜索中</div>
<div class="legend-item"><div class="box" style="background:#9c27b0"></div>已访问</div>
<div class="legend-item"><div class="box" style="background:#00d4ff"></div>路径</div>
</div>
</div>

<div class="panel right">
<div class="tabs"><button class="tab active" onclick="showTab('princ')">原理</button><button class="tab" onclick="showTab('code')">代码</button></div>
<div id="princ" class="content"></div>
<div id="code" class="content"><pre id="codeTxt"></pre></div>
</div>
</div>

<script>
const R1=12,C1=15,R2=15,C2=20;
let cur="search",algo="bfs",tool="wall",run=false;
let maze=[],st={r:2,c:2},en={r:9,c:12};

const algos={
bfs:{name:"BFS",p:'<h3>广度优先搜索BFS</h3><p>从起点开始，层层向外扩展，像水波纹一样。</p><p><b>特点：</b>队列实现，保证最短路径</p><pre>from collections import deque
def bfs(s,e):
 q=deque([s])
 v={s}
 while q:
  r,c=q.popleft()
  if (r,c)==e:return path
  for dr,dc in dirs:
   nr,nc=r+dr,c+dc
   if valid(nr,nc)and(nr,nc)not in v:
    v.add((nr,nc));q.append((nr,nc))'},
dfs:{name:"DFS",p:'<h3>深度优先搜索DFS</h3><p>一条路走到黑，不行再回溯。</p><p><b>特点：</b>栈实现，不保证最短</p><pre>def dfs(s,e):
 s=[s];v={}
 while stack:
  r,c=stack.pop()
  if (r,c)==e:return path
  for dr,dc in dirs:
   nr,nc=r+dr,c+dc
   if valid(nr,nc)and(nr,nc)not in v:
    v.add((nr,nc));stack.append((nr,nc))'},
astar:{name:"A*",p:'<h3>A*启发式搜索</h3><p>f=g+h,g是已走距离，h是估算距离。</p><p><b>特点：</b>优先队列，智能引导，保证最短</p><pre>import heapq
def h(a,b):return abs(a[0]-b[0])+abs(a[1]-b[1])
def astar(s,e):
 pq=[(0,s)];g={s:0}
 while pq:
  f,(r,c)=heapq.heappop(pq)
  if (r,c)==e:return path
  for dr,dc in dirs:
   nr,nc=r+dr,c+dc
   if valid(nr,nc):
    ng=g[(r,c)]+1
    if ng<g.get((nr,nc),999):
     g[(nr,nc)]=ng
     heapq.heappush(pq,(ng+h((nr,nc),e),(nr,nc)))'},
dijkstra:{name:"Dijkstra",p:'<h3>Dijkstra最短路径</h3><p>始终优先处理距离最短的节点。</p><p><b>特点：</b>保证最优解，无方向引导</p><pre>import heapq
def dijk(s,e):
 pq=[(0,s)];d={s:0}
 while pq:
  dist,(r,c)=heapq.heappop(pq)
  if (r,c)==e:return path
  for dr,dc in dirs:
   nr,nc=r+dr,c+dc
   if valid(nr,nc):
    nd=dist+1
    if nd<d.get((nr,nc),999):
     d[(nr,nc)]=nd
     heapq.heappush(pq,(nd,(nr,nc)))'},
astar2:{name:"A*",p:'<h3>A*路径规划</h3><p>同A*搜索算法，用于路径规划。</p><pre>import heapq
def h(a,b):return abs(a[0]-b[0])+abs(a[1]-b[1])
def astar(s,e):
 pq=[(0,s)];g={s:0}
 while pq:
  f,(r,c)=heapq.heappop(pq)
  if (r,c)==e:return path
  for dr,dc in dirs:
   nr,nc=r+dr,c+dc
   if valid(nr,nc):
    ng=g[(r,c)]+1
    if ng<g.get((nr,nc),999):
     g[(nr,nc)]=ng
     heapq.heappush(pq,(ng+h((nr,nc),e),(nr,nc)))'}
};

function init(){
let r=cur==="search"?R1:R2,c=cur==="search"?C1:C2;
maze=[];for(let i=0;i<r;i++){maze[i]=[];for(let j=0;j<c;j++)maze[i][j]=0;}
st=cur==="search"?{r:2,c:2}:{r:2,c:2};
en=cur==="search"?{r:9,c:12}:{r:12,c:17};
draw();
upInfo();
}

function draw(){
let r=cur==="search"?R1:R2,c=cur==="search"?C1:C2;
let g=document.getElementById("grid");
g.style.gridTemplateColumns="repeat("+c+",25px)";
g.innerHTML="";
for(let i=0;i<r;i++){
for(let j=0;j<c;j++){
let d=document.createElement("div");
d.className="cell";d.dataset.r=i;d.dataset.c=j;
if(i===st.r&&j===st.c)d.classList.add("start");
else if(i===en.r&&j===en.c)d.classList.add("end");
else if(maze[i][j]===1)d.classList.add("wall");
d.onclick=()=>click(i,j);
g.appendChild(d);
}}}
function click(r,c){
if(run)return;
if(tool==="wall"){if(!isSE(r,c))maze[r][c]=maze[r][c]?0:1;}
else if(tool==="start"){if(maze[r][c]!==1)st={r,c};}
else if(tool==="end"){if(maze[r][c]!==1)en={r,c};}
else if(tool==="erase")maze[r][c]=0;
draw();
}
function isSE(r,c){return(r===st.r&&c===st.c)||(r===en.r&&c===en.c);}

function selCase(x){
cur=x;document.querySelectorAll(".btn-case").forEach(b=>b.classList.remove("active"));
document.querySelector(".btn-case:nth-child("+(x==="search"?1:2)+")").classList.add("active");
document.getElementById("searchOpts").style.display=x==="search"?"block":"none";
document.getElementById("pathOpts").style.display=x==="path"?"block":"none";
if(x==="search"){algo="bfs";document.querySelectorAll("#searchOpts .btn-algo")[0].classList.add("active");}
else{algo="dijkstra";document.querySelectorAll("#pathOpts .btn-algo")[0].classList.add("active");}
init();
}
function selAlgo(x){algo=x;
document.querySelectorAll(".btn-algo").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");upInfo();
}
function setTool(x){tool=x;document.querySelectorAll(".tool-btn").forEach(b=>b.classList.remove("active"));event.target.classList.add("active");}
function upSpd(){document.getElementById("spdVal").textContent=["很慢","慢","中","快","很快"][Math.floor((document.getElementById("spd").value-1)/20)];}
function spd(){return Math.max(5,150-document.getElementById("spd").value*1.5);}
function slp(ms){return new Promise(r=>setTimeout(r,ms));}

function upInfo(){document.getElementById("princ").innerHTML=algos[algo].p;document.getElementById("codeTxt").textContent=algos[algo].p.replace(/<[^>]+>/g,"");}
function showTab(x){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.querySelectorAll(".content").forEach(c=>c.classList.remove("active"));event.target.classList.add("active");document.getElementById(x).classList.add("active");}

function rst(){if(run)return;init();document.getElementById("visCnt").textContent="0";document.getElementById("pathLen").textContent="0";document.getElementById("rslt").className="result";}

async function run(){
if(run)return;run=true;
document.getElementById("rslt").className="result";
let vc=0,path=[];
if(cur==="search"){clr();if(algo==="bfs")path=await bfs(vc);else if(algo==="dfs")path=await dfs(vc);else path=await astar(vc);}
else{clr();if(algo==="dijkstra")path=await dijk(vc);else path=await astar2(vc);}
document.getElementById("visCnt").textContent=vc;
if(path.length>0){
let cells=document.querySelectorAll(".cell");
let c=cur==="search"?C1:C2;
for(let i=0;i<path.length;i++){
let[r,px]=path[i];
cells[r*c+px].classList.remove("searching","visited");
cells[r*c+px].classList.add("path");await slp(30);}
document.getElementById("pathLen").textContent=path.length-1;
document.getElementById("rslt").className="result show ok";document.getElementById("rslt").textContent="找到路径！长度:"+(path.length-1);}
else{document.getElementById("rslt").className="result show no";document.getElementById("rslt").textContent="无法到达！";}
run=false;
}
function clr(){document.querySelectorAll(".cell").forEach(c=>{c.classList.remove("searching","visited","path");let r=parseInt(c.dataset.r),cc=parseInt(c.dataset.c);if(r===st.r&&cc===st.c)c.classList.add("start");else if(r===en.r&&cc===en.c)c.classList.add("end");else if(maze[r][cc]===1)c.classList.add("wall");});}

function dirs(){return[[0,1],[1,0],[0,-1],[-1,0]];}
function h(r,c){return Math.abs(r-en.r)+Math.abs(c-en.c);}

async function bfs(vc){let q=[[st.r,st.c,[]]];let v=new Set();let par={};let cells=document.querySelectorAll(".cell");let c=C1;
while(q.length){let[r,px,p]=q.shift();let k=r+","+px;
if(v.has(k))continue;v.add(k);vc++;document.getElementById("visCnt").textContent=vc;
if(r===en.r&&px===en.c)return rp(par,r,px);
let idx=r*c+px;if(!isSE(r,px))cells[idx].classList.add("searching");await slp(spd());if(!isSE(r,px)){cells[idx].classList.remove("searching");cells[idx].classList.add("visited");}
for(let[dR,dC]of dirs()){let nr=r+dR,nc=px+dC,nk=nr+","+nc;
if(nr>=0&&nr<R1&&nc>=0&&nc<C1&&maze[nr][nc]!==1&&!v.has(nk)){par[nk]=[r,px];q.push([nr,nc,p.concat([[r,px]])]);}}}
return[];}

async function dfs(vc){let s=[[st.r,st.c,[]]];let v=new Set();let par={};let cells=document.querySelectorAll(".cell");let c=C1;
while(s.length){let[r,px,p]=s.pop();let k=r+","+px;
if(v.has(k))continue;v.add(k);vc++;document.getElementById("visCnt").textContent=vc;
if(r===en.r&&px===en.c)return rp(par,r,px);
let idx=r*c+px;if(!isSE(r,px))cells[idx].classList.add("searching");await slp(spd());if(!isSE(r,px)){cells[idx].classList.remove("searching");cells[idx].classList.add("visited");}
for(let i=dirs().length-1;i>=0;i--){let[dR,dC]=dirs()[i];let nr=r+dR,nc=px+dC,nk=nr+","+nc;
if(nr>=0&&nr<R1&&nc>=0&&nc<C1&&maze[nr][nc]!==1&&!v.has(nk)){par[nk]=[r,px];s.push([nr,nc,p.concat([[r,px]])]);}}}
return[];}

async function astar(vc){let pq=[[h(st.r,st.c),0,st.r,st.c,[]]];let cl=new Set();let g={};let par={};let cells=document.querySelectorAll(".cell");let c=C1;
while(pq.length){pq.sort((a,b)=>a[0]-b[0]);let[f,gv,r,px,p]=pq.shift();let k=r+","+px;
if(cl.has(k))continue;cl.add(k);vc++;document.getElementById("visCnt").textContent=vc;
if(r===en.r&&px===en.c)return rp(par,r,px);
let idx=r*c+px;if(!isSE(r,px))cells[idx].classList.add("searching");await slp(spd());if(!isSE(r,px)){cells[idx].classList.remove("searching");cells[idx].classList.add("visited");}
for(let[dR,dC]of dirs()){let nr=r+dR,nc=px+dC,nk=nr+","+nc;
if(nr>=0&&nr<R1&&nc>=0&&nc<C1&&maze[nr][nc]!==1&&!cl.has(nk)){let ng=gv+1;
if(ng<(g[nk]||Infinity)){g[nk]=ng;let nf=ng+h(nr,nc);par[nk]=[r,px];pq.push([nf,ng,nr,nc,p.concat([[r,px]])]);}}}}
return[];}

async function dijk(vc){let pq=[[0,st.r,st.c,[]]];let v=new Set();let d={};let par={};let cells=document.querySelectorAll(".cell");let c=C2;
while(pq.length){pq.sort((a,b)=>a[0]-b[0]);let[dist,r,px,p]=pq.shift();let k=r+","+px;
if(v.has(k))continue;v.add(k);vc++;document.getElementById("visCnt").textContent=vc;
if(r===en.r&&px===en.c)return rp(par,r,px);
let idx=r*c+px;if(!isSE(r,px))cells[idx].classList.add("searching");await slp(spd());if(!isSE(r,px)){cells[idx].classList.remove("searching");cells[idx].classList.add("visited");}
for(let[dR,dC]of dirs()){let nr=r+dR,nc=px+dC,nk=nr+","+nc;
if(nr>=0&&nr<R2&&nc>=0&&nc<C2&&maze[nr][nc]!==1&&!v.has(nk)){let nd=dist+1;
if(nd<(d[nk]||Infinity)){d[nk]=nd;par[nk]=[r,px];pq.push([nd,nr,nc,p.concat([[r,px]])]);}}}
return[];}

async function astar2(vc){let pq=[[h(st.r,st.c),0,st.r,st.c,[]]];let cl=new Set();let g={};let par={};let cells=document.querySelectorAll(".cell");let c=C2;
while(pq.length){pq.sort((a,b)=>a[0]-b[0]);let[f,gv,r,px,p]=pq.shift();let k=r+","+px;
if(cl.has(k))continue;cl.add(k);vc++;document.getElementById("visCnt").textContent=vc;
if(r===en.r&&px===en.c)return rp(par,r,px);
let idx=r*c+px;if(!isSE(r,px))cells[idx].classList.add("searching");await slp(spd());if(!isSE(r,px)){cells[idx].classList.remove("searching");cells[idx].classList.add("visited");}
for(let[dR,dC]of dirs()){let nr=r+dR,nc=px+dC,nk=nr+","+nc;
if(nr>=0&&nr<R2&&nc>=0&&nc<C2&&maze[nr][nc]!==1&&!cl.has(nk)){let ng=gv+1;
if(ng<(g[nk]||Infinity)){g[nk]=ng;let nf=ng+h(nr,nc);par[nk]=[r,px];pq.push([nf,ng,nr,nc,p.concat([[r,px]])]);}}}}
return[];}

function rp(par,er,ec){let path=[],k=er+","+ec;while(k){let[r,c]=k.split(",").map(Number);path.unshift([r,c]);k=par[k]?par[k][0]+","+par[k][1]:null;}return path;}

init();
</script>
</body>
</html>
